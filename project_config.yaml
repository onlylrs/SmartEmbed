# Jina Embeddings V4 Research Project Configuration

# 基础模型路径（包含预训练的Jina模型）
base_model_path: "/project/fyp25_hc2/jina-embeddings-v4"

# 数据配置 
data:
  image_base_dir: "data/Images"

# 训练配置
training:
  output_dir: "outputs/models"
  batch_size: 3
  learning_rate: 1e-4
  epochs: 30
  use_lora: true
  # Optional: loss controls
  # temperature is tau; lower -> sharper. This initializes a learnable parameter (logit_scale)
  temperature: 0.02
  # If true: use simplified (one-direction) InfoNCE for single-vector; if false: symmetric (default)
  # can override the one in training_config.py
  use_simplified_contrastive: false
  
# wandb配置
wandb:
  entity: "smart-search-fyp"
  project: "jina-embeddings-finetune"
  enabled: true

# LoRA配置
lora:
  r: 16
  alpha: 16
  dropout: 0.1

  # Optional: loss weights
  loss_single_weight: 1.0
  loss_multi_weight: 1.0
# 系统配置
system:
  bf16: true
  max_seq_length: 256
